name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore WordleSolverNew.sln

      - name: Build
        run: dotnet build WordleSolverNew.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WordleSolverNew.sln --configuration Release --no-build --verbosity normal
