name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Restore frontend dependencies
        run: npm ci

      - name: Build Elm client
        run: npm run build:client

      - name: Test Elm client
        run: npm run test:client

      - name: Verify generated client is current
        run: git diff --exit-code -- WordleSolver/wwwroot/app.js

      - name: Restore dependencies
        run: dotnet restore WordleSolverNew.sln

      - name: Build
        run: dotnet build WordleSolverNew.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WordleSolverNew.sln --configuration Release --no-build --verbosity normal
